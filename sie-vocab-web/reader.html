<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIE 教材阅读</title>
    <link rel="icon" type="image/png" href="/book.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="/css/style.css?v=52">
</head>
<body>
<div class="wrapper-wide">
    <!-- 导航栏 -->
    <nav class="nav-bar">
        <a href="." class="nav-link">首页</a>
        <a href="review.html" class="nav-link">复习</a>
        <a href="bookshelf.html" class="nav-link">书架</a>
        <span class="nav-current">阅读</span>
        <a href="me.html" class="nav-logout" title="我的账户">我的</a>
    </nav>

    <div class="header">
        <h1>SIE 教材阅读</h1>
        <p id="reader-subtitle">正在加载进度…</p>
        <p id="reader-book-info" style="display:none;"></p>
    </div>
    <div class="reader-book-selector" style="text-align:center;margin-bottom:12px;">
        <a href="bookshelf.html" class="btn-book-select">📚 返回书架选书</a>
    </div>

    <!-- 页面导航栏 -->
    <div class="reader-page-nav">
        <button id="btn-prev-page" class="btn-page-nav" onclick="prevPage()">上一页</button>
        <span id="reader-page-display" class="reader-page-label">第 -- 页</span>
        <button id="btn-next-page" class="btn-page-nav" onclick="nextPage()">下一页</button>
        <span class="reader-jump">
            跳转: <input id="input-jump-page" type="number" min="1" placeholder="页号"
                  onkeydown="if(event.key==='Enter')jumpToPage()">
            <button class="btn-jump" onclick="jumpToPage()">跳转</button>
        </span>
    </div>

    <!-- 主布局：目录 + 左侧图片 + 右侧内容 -->
    <div class="reader-layout">
        <!-- 目录侧边栏（可折叠） -->
        <div id="reader-toc-sidebar" class="reader-toc-sidebar">
            <div class="reader-toc-header">
                <span>📑 目录 / TOC</span>
                <button class="reader-toc-close" onclick="toggleToc()">✕</button>
            </div>
            <div class="reader-toc-list" id="reader-toc-list">
                <div class="reader-toc-empty">加载中…</div>
            </div>
        </div>
        <!-- 目录展开标签（收起时显示） -->
        <div id="reader-toc-tab" class="reader-toc-tab" onclick="toggleToc()" title="展开目录">
            <span>☰</span>
            <span class="toc-tab-label">目录</span>
        </div>
        <!-- 左侧：PDF 原页图片 / 单词查询面板 / 句子拆解面板（切换显示） -->
        <div class="reader-left">
            <!-- 三模式切换栏 -->
            <div class="reader-left-toggle" id="reader-left-toggle">
                <button class="reader-toggle-btn active" data-panel="pdf" onclick="switchLeftPanel('pdf')">📄 PDF</button>
                <button class="reader-toggle-btn" data-panel="word" onclick="switchLeftPanel('word')">📖 单词</button>
                <button class="reader-toggle-btn" data-panel="breakdown" onclick="switchLeftPanel('breakdown')">🔍 句子</button>
            </div>
            <div id="reader-return-word" class="reader-return-word" style="display:none;" onclick="returnToLastWord()">
                <span class="return-word-icon">🔍</span>
                <span class="return-word-label">返回单词翻译</span>
                <span class="return-word-text" id="return-word-text"></span>
            </div>
            <div id="reader-image-container" class="reader-image-container">
                <div class="reader-image-placeholder">加载中…</div>
            </div>
            <div id="reader-word-panel" class="reader-word-panel" style="display:none;">
                <div class="reader-word-panel-header">
                    <span class="reader-word-panel-title">📖 单词查询</span>
                </div>
                <div id="reader-word-panel-body" class="reader-word-panel-body"></div>
            </div>
            <div id="reader-breakdown-panel" class="reader-word-panel" style="display:none;">
                <div class="reader-word-panel-header">
                    <span class="reader-word-panel-title">🔍 句子拆解</span>
                </div>
                <div id="reader-breakdown-panel-body" class="reader-word-panel-body"></div>
            </div>
        </div>

        <!-- 右侧：内容区 -->
        <div class="reader-right">
            <div id="reader-content" class="reader-content">
                <div id="reader-loading" class="review-loading" style="display:none;">正在加载页面内容…</div>
                <div id="reader-error" class="reader-error" style="display:none;"></div>
                <div id="reader-empty" class="reader-empty" style="display:none;">
                    <div class="all-done-icon">📄</div>
                    <div class="all-done-title">此页无文本内容</div>
                    <div class="all-done-sub">可能是空白页或章节分隔页，请跳转到下一页面</div>
                </div>
                <div id="reader-no-books" class="reader-empty" style="display:none;">
                    <div class="all-done-icon">📚</div>
                    <div class="all-done-title">暂无书籍 / No Books Yet</div>
                    <div class="all-done-sub">请先前往书架上传 PDF 教材，再来阅读</div>
                    <a href="bookshelf.html" class="btn-book-select" style="display:inline-block;margin-top:20px;">📚 前往书架 / Go to Bookshelf</a>
                </div>
                <div id="reader-main" style="display:none;">
                    <div id="reader-section" class="reader-section"></div>
                    <div class="reader-block">
                        <div class="reader-block-label">原文 / Original</div>
                        <div id="reader-en" class="reader-en"></div>
                    </div>
                    <div class="reader-block">
                        <div class="reader-block-label">译文 / Translation</div>
                        <div id="reader-zh" class="reader-zh"></div>
                    </div>
                    <div class="reader-block">
                        <div class="reader-block-label">词汇表 / Vocabulary</div>
                        <div id="reader-vocab" class="reader-vocab"></div>
                    </div>
                    <div class="reader-block">
                        <div class="reader-block-label">语法笔记 / Grammar</div>
                        <div id="reader-grammar" class="reader-grammar"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- 左右全高翻页按钮 -->
<div id="nav-edge-left" class="nav-edge" onclick="prevPage()" title="上一页">
    <span class="nav-edge-arrow">◂</span>
</div>
<div id="nav-edge-right" class="nav-edge nav-edge-right" onclick="nextPage()" title="下一页">
    <span class="nav-edge-arrow">▸</span>
</div>

<!-- 单词查询弹窗 -->
<div id="word-modal" class="word-modal" onclick="closeModal(event)">
    <div class="word-modal-content" onclick="event.stopPropagation()">
        <div class="word-modal-header">
            <span class="word-modal-title">单词查询</span>
            <button class="word-modal-close" onclick="closeModal()">✕</button>
        </div>
        <div id="word-modal-body" class="word-modal-body"></div>
    </div>
</div>

<script src="/js/auth.js?v=6"></script>
<script src="/js/reader.js?v=53"></script>
</body>
</html>
