<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词复习</title>
    <link rel="icon" type="image/png" href="/book.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="/css/style.css?v=43">
</head>
<body>
<div class="wrapper-review">
    <!-- 导航栏 -->
    <nav class="nav-bar">
        <a href="." class="nav-link">🏠 首页</a>
        <span class="nav-current">📝 复习</span>
        <a href="bookshelf.html" class="nav-link">📚 书架</a>
        <a href="reader.html" class="nav-link">📖 阅读</a>
        <a href="me.html" class="nav-logout" title="我的账户">我的</a>
    </nav>

    <div class="header">
        <h1>📝 单词复习</h1>
        <p>随机抽词，检验记忆</p>
    </div>

    <!-- 模式切换 -->
    <div class="mode-toggle-bar">
        <button id="btn-mode-daily" class="btn-mode active" onclick="switchMode('daily')">📅 每日模式</button>
        <button id="btn-mode-free" class="btn-mode" onclick="switchMode('free')">🆓 自由模式</button>
        <button id="btn-mode-overview" class="btn-mode" onclick="switchMode('overview')">📊 总览</button>
    </div>

    <div class="review-box">
        <!-- 加载中 -->
        <div id="review-loading" class="review-loading">正在抽取单词…</div>

        <!-- 单词显示区 -->
        <div id="review-card" class="review-card" style="display:none;">
            <button id="btn-speak" class="btn-speak" onclick="speakWord()" title="朗读发音">🔊</button>
            <div class="review-word-en" id="review-word-en"></div>
            <div id="batch-progress" class="batch-progress" style="display:none;"></div>
            <button id="btn-expand" class="btn-expand" onclick="toggleExpand()">🔽 展开详情</button>
            <div id="review-stats" class="review-stats" style="display:none;"></div>
            <div id="review-detail" class="review-detail" style="display:none;"></div>
        </div>

        <!-- 操作栏（展开详情后显示） -->
        <div class="review-actions" style="display:none;" id="review-actions">
            <span id="actions-daily">
                <button class="btn-forgotten" onclick="markForgotten()">😐 没记住</button>
                <button class="btn-remembered" onclick="markRemembered()">✅ 记住了</button>
                <button class="btn-next-batch" id="btn-next-batch" onclick="requestNextBatch()" style="display:none;">📦 再来一批</button>
            </span>
            <span id="actions-free" style="display:none;">
                <button class="btn-next" onclick="nextWord()">➡️ 下一个</button>
            </span>
        </div>

        <!-- 总览模式 -->
        <div id="overview-container" class="overview-container" style="display:none;">
            <div class="overview-stats">
                <div class="stat-card">
                    <div class="stat-icon">📚</div>
                    <div class="stat-value" id="ov-total-words">0</div>
                    <div class="stat-label">单词总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔄</div>
                    <div class="stat-value" id="ov-total-reviews">0</div>
                    <div class="stat-label">总复习次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value" id="ov-streak">0</div>
                    <div class="stat-label">连续天数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-value" id="ov-today-count">0</div>
                    <div class="stat-label">今日复习</div>
                </div>
            </div>

            <div class="calendar-nav">
                <button id="cal-prev" class="cal-nav-btn" onclick="navigateMonth(-1)">◀</button>
                <span id="cal-month-label" class="cal-month-label"></span>
                <button id="cal-next" class="cal-nav-btn" onclick="navigateMonth(1)">▶</button>
            </div>

            <div id="calendar-grid" class="calendar-grid"></div>
        </div>
    </div>
</div>

<script src="/js/auth.js?v=5"></script>
<script src="/js/review.js?v=26"></script>
</body>
</html>
