<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词翻译</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .wrapper {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 6px; }
        .header p { font-size: 1rem; opacity: 0.85; }

        .chat-box {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            padding: 30px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .input-row input {
            flex: 1;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: #667eea; }
        .input-row button {
            padding: 14px 28px;
            font-size: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.15s;
            white-space: nowrap;
        }
        .input-row button:hover { opacity: 0.9; }
        .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

        .response-area {
            min-height: 160px;
            background: #f8f9fb;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            padding: 20px;
            color: #333;
            line-height: 1.7;
        }
        .response-area.placeholder {
            color: #aaa;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .response-area.loading {
            color: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 单词卡片 */
        .word-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .word-card:last-child { margin-bottom: 0; }

        .word-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            background: #f0f2ff;
            border-bottom: 1px solid #e8e8e8;
        }
        .word-header .word-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333;
        }
        .word-header .badge {
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 600;
            color: #fff;
        }
        .badge-base { background: #4caf50; }
        .badge-derived { background: #ff9800; }
        .pos-tag {
            font-size: 0.85rem;
            color: #667eea;
            font-weight: 600;
            margin-left: auto;
        }

        .word-derivation {
            padding: 10px 18px;
            background: #fffbf0;
            border-bottom: 1px solid #f0e6c0;
            font-size: 0.85rem;
            color: #8d6e00;
        }

        .word-card table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .word-card table th {
            width: 56px;
            text-align: left;
            padding: 10px 0 10px 18px;
            color: #888;
            font-weight: 600;
            vertical-align: top;
            white-space: nowrap;
        }
        .word-card table td {
            padding: 10px 18px 10px 0;
            color: #333;
            vertical-align: top;
        }

        .domain-tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 1px 7px;
            border-radius: 4px;
            margin-right: 6px;
            font-weight: 600;
            vertical-align: 1px;
        }
        .domain-tag.finance { background: #e8f5e9; color: #2e7d32; }
        .domain-tag.daily   { background: #e3f2fd; color: #1565c0; }

        .example-table td:first-child { width: 30px; color: #aaa; text-align: center; }
        .example-table tr { border-top: 1px solid #f0f0f0; }
        .example-table tr:first-child { border-top: none; }

        .error-msg { color: #e53935; }

        /* 操作按钮栏 */
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .btn-save-all {
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #4caf50;
            color: #fff;
            transition: opacity 0.15s;
        }
        .btn-save-all:hover { opacity: 0.85; }
        .btn-save-all:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-retranslate {
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #ff9800;
            color: #fff;
            transition: opacity 0.15s;
        }
        .btn-retranslate:hover { opacity: 0.85; }

        .cached-notice {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #888;
        }
        .cached-notice .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; }

        /* 单词卡片操作区 */
        .word-actions {
            padding: 10px 18px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-end;
        }
        .btn-save {
            padding: 6px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 2px solid #4caf50;
            border-radius: 6px;
            cursor: pointer;
            background: #fff;
            color: #4caf50;
            transition: all 0.15s;
        }
        .btn-save:hover { background: #4caf50; color: #fff; }
        .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-save.saved { background: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }

        /* 比对容器 — 醒目虚线框框住新旧两个版本 */
        .diff-compare-box {
            border: 3px dashed #667eea;
            border-radius: 12px;
            margin-bottom: 24px;
            overflow: hidden;
            background: #fafbff;
        }
        .diff-compare-box-header {
            padding: 10px 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .diff-compare-box-header .word-title {
            font-size: 1.2rem;
        }
        .diff-compare-box-header .badge-sm {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.25);
            color: #fff;
            font-weight: 600;
        }
        .diff-compare-box-body {
            display: flex;
            gap: 0;
        }
        .diff-panel {
            flex: 1;
            min-width: 0;
        }
        .diff-panel-label {
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .diff-panel.old .diff-panel-label {
            background: #ffebee;
            color: #c62828;
            border-bottom: 2px solid #ef9a9a;
        }
        .diff-panel.new .diff-panel-label {
            background: #e8f5e9;
            color: #2e7d32;
            border-bottom: 2px solid #a5d6a7;
        }
        .diff-panel .word-card {
            margin: 0;
            border: none;
            border-radius: 0;
        }
        .diff-panel.old .word-card {
            opacity: 0.65;
            background: #fff5f5;
        }
        .diff-panel.new .word-card {
            border-left: 3px solid #4caf50;
        }
        .diff-divider {
            width: 2px;
            background: #d0d0d0;
            flex-shrink: 0;
        }
        .diff-compare-actions {
            padding: 10px 18px;
            border-top: 1px solid #e0e0e0;
            text-align: right;
            background: #fafbff;
        }
        .diff-new-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: #e8f5e9;
            color: #2e7d32;
            font-weight: 600;
            margin-left: 8px;
        }
        .diff-changed-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: #fff3e0;
            color: #e65100;
            font-weight: 600;
            margin-left: 8px;
        }
        .diff-only-old-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: #ffebee;
            color: #c62828;
            font-weight: 600;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>📖 单词翻译</h1>
        <p>输入英语单词，AI 为你分析</p>
    </div>
    <div class="chat-box">
        <div class="input-row">
            <input id="input" type="text" placeholder="请输入英语单词..." autofocus>
            <button id="btn" onclick="send()">翻译</button>
        </div>
        <div id="response" class="response-area placeholder">等待输入单词…</div>
    </div>
</div>

<script>
const input = document.getElementById('input');
const btn   = document.getElementById('btn');
const resp  = document.getElementById('response');

// 状态
let currentMode = 'new';     // 'new' | 'cached' | 'diff'
let oldWords = null;         // DB 旧数据
let currentWords = null;     // 当前展示的词数据
let currentQueryWord = '';   // 当前查询的单词

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== 主流程 ====================

async function send() {
    const word = input.value.trim();
    if (!word) return;
    currentQueryWord = word;

    btn.disabled = true;
    resp.className = 'response-area loading';
    resp.innerHTML = '正在查询…';

    try {
        // 1. 先查数据库
        const qRes = await fetch('/api/word/query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ word })
        });
        const qData = await qRes.json();

        if (qData.found && qData.data && qData.data.words && qData.data.words.length > 0) {
            // 数据库已有
            oldWords = qData.data.words;
            currentWords = qData.data.words;
            currentMode = 'cached';
            renderCachedView(qData.data.words);
        } else {
            // 数据库没有，调 AI
            await fetchAIAndRender();
        }
    } catch (err) {
        resp.className = 'response-area';
        resp.innerHTML = '<span class="error-msg">❌ 请求失败: ' + esc(err.message) + '</span>';
    } finally {
        btn.disabled = false;
        input.focus();
    }
}

// ==================== AI 翻译 ====================

async function fetchAIAndRender(mode) {
    btn.disabled = true;
    resp.className = 'response-area loading';
    resp.innerHTML = '正在分析单词…';

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: currentQueryWord })
        });
        const data = await res.json();
        if (data.error) {
            resp.className = 'response-area';
            resp.innerHTML = '<span class="error-msg">❌ 翻译失败: ' + esc(data.error) + '</span>';
            return;
        }
        const json = parseReplyJSON(data.reply);
        if (!json || !json.words) {
            resp.className = 'response-area';
            resp.textContent = data.reply;
            return;
        }

        if (mode === 'diff' && oldWords) {
            // 比对模式
            currentWords = json.words;
            currentMode = 'diff';
            renderDiffView(oldWords, json.words);
        } else {
            // 新模式
            currentWords = json.words;
            oldWords = null;
            currentMode = 'new';
            renderWords(json.words, 'new');
        }
    } catch (err) {
        resp.className = 'response-area';
        resp.innerHTML = '<span class="error-msg">❌ 请求失败: ' + esc(err.message) + '</span>';
    } finally {
        btn.disabled = false;
        input.focus();
    }
}

function parseReplyJSON(reply) {
    try { return JSON.parse(reply); } catch (e) {}
    const cleaned = reply.replace(/^```(?:json)?\s*\n?/i, '').replace(/\n?```\s*$/, '').trim();
    try { return JSON.parse(cleaned); } catch (e) {}
    return null;
}

// ==================== 渲染：缓存视图 ====================

function renderCachedView(words) {
    resp.className = 'response-area';
    resp.innerHTML = '';

    // 操作栏
    const bar = document.createElement('div');
    bar.className = 'action-bar';
    bar.innerHTML = '<span class="cached-notice"><span class="dot"></span> 来自数据库（已保存）</span>';
    const reBtn = document.createElement('button');
    reBtn.className = 'btn-retranslate';
    reBtn.textContent = '🔄 仍要翻译';
    reBtn.onclick = () => fetchAIAndRender('diff');
    bar.appendChild(reBtn);
    resp.appendChild(bar);

    // 渲染单词卡片（无保存按钮）
    words.forEach(w => appendWordCard(resp, w, 'cached'));
}

// ==================== 渲染：新模式（AI 结果 + 保存按钮） ====================

function renderWords(words, mode) {
    resp.className = 'response-area';
    resp.innerHTML = '';

    // 操作栏 — 保存全部
    if (mode === 'new') {
        const bar = document.createElement('div');
        bar.className = 'action-bar';
        const saveAllBtn = document.createElement('button');
        saveAllBtn.className = 'btn-save-all';
        saveAllBtn.textContent = '💾 保存全部';
        saveAllBtn.onclick = () => saveAll();
        bar.appendChild(saveAllBtn);
        resp.appendChild(bar);
    }

    words.forEach((w, i) => appendWordCard(resp, w, mode, i));
}

// ==================== 渲染：比对视图 ====================

function renderDiffView(oldList, newList) {
    resp.className = 'response-area';
    resp.innerHTML = '';

    // 操作栏 — 保存全部
    const bar = document.createElement('div');
    bar.className = 'action-bar';
    const saveAllBtn = document.createElement('button');
    saveAllBtn.className = 'btn-save-all';
    saveAllBtn.textContent = '💾 保存全部新结果';
    saveAllBtn.onclick = () => saveAll();
    bar.appendChild(saveAllBtn);
    resp.appendChild(bar);

    const oldMap = new Map(oldList.map(w => [w.word, w]));
    const newMap = new Map(newList.map(w => [w.word, w]));

    // 每个词一个比对框
    newList.forEach((w, i) => {
        const old = oldMap.get(w.word);
        const box = document.createElement('div');
        box.className = 'diff-compare-box';

        let headerBadges = '';
        if (!old) {
            headerBadges = '<span class="badge-sm">🆕 新发现</span>';
        } else if (!deepEqual(old, w)) {
            headerBadges = '<span class="diff-changed-badge">有变更</span>';
        }

        // 头部
        box.innerHTML = '<div class="diff-compare-box-header">' +
            '<span class="word-title">' + esc(w.word) + '</span>' +
            headerBadges +
            '</div>';

        // Body — 旧/新并排
        const body = document.createElement('div');
        body.className = 'diff-compare-box-body';

        if (old) {
            // 旧版面板
            const oldPanel = document.createElement('div');
            oldPanel.className = 'diff-panel old';
            oldPanel.innerHTML = '<div class="diff-panel-label">旧版</div>';
            body.appendChild(oldPanel);
            appendWordCard(oldPanel, old, 'none');

            // 分隔线
            const divider = document.createElement('div');
            divider.className = 'diff-divider';
            body.appendChild(divider);
        }

        // 新版面板
        const newPanel = document.createElement('div');
        newPanel.className = 'diff-panel new';
        newPanel.innerHTML = '<div class="diff-panel-label">新版</div>';
        body.appendChild(newPanel);
        appendWordCard(newPanel, w, 'none', i);

        box.appendChild(body);

        // 操作行
        const actions = document.createElement('div');
        actions.className = 'diff-compare-actions';
        actions.innerHTML = '<button class="btn-save" data-idx="' + i + '" onclick="saveWord(' + i + ', this)">💾 保存新版</button>';
        box.appendChild(actions);

        resp.appendChild(box);
    });

    // 旧版中有但新版中没有的
    oldList.forEach(w => {
        if (!newMap.has(w.word)) {
            const box = document.createElement('div');
            box.className = 'diff-compare-box';
            box.innerHTML = '<div class="diff-compare-box-header">' +
                '<span class="word-title">' + esc(w.word) + '</span>' +
                '<span class="diff-only-old-badge">旧版独有（新版已移除）</span>' +
                '</div>';
            const body = document.createElement('div');
            body.className = 'diff-compare-box-body';
            const oldPanel = document.createElement('div');
            oldPanel.className = 'diff-panel old';
            oldPanel.innerHTML = '<div class="diff-panel-label">旧版</div>';
            body.appendChild(oldPanel);
            appendWordCard(oldPanel, w, 'none');
            box.appendChild(body);
            resp.appendChild(box);
        }
    });
}

// ==================== 构建单词卡片 ====================

function appendWordCard(parent, w, mode, index) {
    const card = document.createElement('div');
    card.className = 'word-card';

    let html = '';

    // 头部
    html += '<div class="word-header">';
    html += '<span class="word-name">' + esc(w.word) + '</span>';
    html += '<span class="badge ' + (w.type === '基础词' ? 'badge-base' : 'badge-derived') + '">' + esc(w.type) + '</span>';
    html += '<span class="pos-tag">' + esc(w.pos) + '</span>';
    html += '</div>';

    // 衍生关系
    if (w.type === '衍生词' && w.baseWord) {
        html += '<div class="word-derivation">';
        html += '基础词：<strong>' + esc(w.baseWord) + '</strong>';
        if (w.derivation) html += ' — ' + esc(w.derivation);
        html += '</div>';
    }

    // 释义
    if (w.meanings && w.meanings.length > 0) {
        html += '<table><tr><th>释义</th><td>';
        w.meanings.forEach(m => {
            html += '<span class="domain-tag ' + (m.domain === '金融' ? 'finance' : 'daily') + '">' + esc(m.domain) + '</span>';
            html += esc(m.text) + '<br>';
        });
        html += '</td></tr></table>';
    }

    // 例句
    if (w.examples && w.examples.length > 0) {
        html += '<table class="example-table">';
        html += '<tr><th>例句</th><td></td><td></td></tr>';
        w.examples.forEach((ex, i) => {
            html += '<tr>';
            html += '<td>' + (i + 1) + '.</td>';
            html += '<td>' + esc(ex.en) + '</td>';
            html += '<td>' + esc(ex.zh) + '</td>';
            html += '</tr>';
        });
        html += '</table>';
    }

    // 操作按钮
    if (mode === 'new' || mode === 'diff-save') {
        html += '<div class="word-actions">';
        html += '<button class="btn-save" data-idx="' + index + '" onclick="saveWord(' + index + ', this)">💾 保存此词</button>';
        html += '</div>';
    }

    card.innerHTML = html;
    parent.appendChild(card);
}

// ==================== 保存操作 ====================

async function saveWord(index, btnEl) {
    if (!currentWords || !currentWords[index]) return;
    const word = currentWords[index];

    btnEl.disabled = true;
    btnEl.textContent = '保存中…';

    try {
        const res = await fetch('/api/word/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(word)
        });
        const data = await res.json();
        if (data.success) {
            btnEl.textContent = '✅ 已保存';
            btnEl.className = 'btn-save saved';
        } else {
            btnEl.textContent = '❌ 失败';
            btnEl.disabled = false;
        }
    } catch (err) {
        btnEl.textContent = '❌ 失败';
        btnEl.disabled = false;
    }
}

async function saveAll() {
    if (!currentWords || currentWords.length === 0) return;

    // 禁用所有保存按钮
    const allBtns = document.querySelectorAll('.btn-save, .btn-save-all');
    allBtns.forEach(b => { b.disabled = true; b.textContent = b.className.includes('save-all') ? '保存中…' : '...'; });

    try {
        const res = await fetch('/api/word/save-all', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ words: currentWords })
        });
        const data = await res.json();
        if (data.success) {
            // 所有保存按钮变已保存
            document.querySelectorAll('.btn-save').forEach(b => {
                b.textContent = '✅ 已保存';
                b.className = 'btn-save saved';
                b.disabled = true;
            });
            const saveAllBtn = document.querySelector('.btn-save-all');
            if (saveAllBtn) { saveAllBtn.textContent = '✅ 全部已保存 (' + data.count + ')'; saveAllBtn.disabled = true; }
            // 更新缓存
            oldWords = JSON.parse(JSON.stringify(currentWords));
        }
    } catch (err) {
        alert('保存失败: ' + err.message);
        allBtns.forEach(b => { b.disabled = false; });
    }
}

// ==================== 工具函数 ====================

function deepEqual(a, b) {
    // 简单比较（不递归 — 只比较 meanings 和 examples 的文本）
    const ja = JSON.stringify({ m: a.meanings, e: a.examples, p: a.pos, d: a.derivation });
    const jb = JSON.stringify({ m: b.meanings, e: b.examples, p: b.pos, d: b.derivation });
    return ja === jb;
}
</script>
</body>
