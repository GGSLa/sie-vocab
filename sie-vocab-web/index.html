<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词翻译</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>📖 单词翻译</h1>
        <p>输入英语单词，AI 为你分析</p>
    </div>
    <div class="chat-box">
        <div class="input-row">
            <input id="input" type="text" placeholder="请输入英语单词..." autofocus>
            <button id="btn" onclick="send()">翻译</button>
        </div>
        <div id="response" class="response-area placeholder">等待输入单词…</div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
